name: Build and Test on Debian and Alpine (x86 and ARM)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: ['debian:11', 'alpine:3.18']
        arch: [amd64, arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
      with:
        platforms: all

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and Test on ${{ matrix.os }} (${{ matrix.arch }})
      run: |
        docker run --rm \
          --platform linux/${{ matrix.arch }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace/copy_command \
          ${{ matrix.os }} \
          /bin/sh -c "
          apk add --no-cache cmake gcc g++ make || apt-get update && apt-get install -y cmake gcc g++ make &&
          cmake -S . -B build &&
          cmake --build build &&
          ctest --test-dir build --output-on-failure
          "

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.arch }}
        path: copy_command/build/Testing/Temporary/LastTest.log
