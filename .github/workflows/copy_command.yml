name: Build and Test Copy Command

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: CMake Build
      uses: threeal/cmake-action@v2
      with:
        source-dir: copy_command
        build-dir: copy_command/build
        run-build: true

    - name: CTest Test
      uses: threeal/ctest-action@v2
      with:
        test-dir: copy_command/build
