name: Build and Test Copy Command

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Install CMake on Ubuntu (Linux)
    - name: Install CMake on Linux
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y cmake build-essential

    # Install CMake on macOS
    - name: Install CMake on macOS
      if: matrix.os == 'macos-latest'
      run: brew install cmake

    # Install CMake on Windows
    - name: Install CMake on Windows
      if: matrix.os == 'windows-latest'
      uses: chrislennon/action-cmake-build@v1
      with:
        cmake_version: '3.21.1'

    - name: Configure CMake
      run: cmake -S copy_command -B copy_command/build

    - name: Build with CMake
      run: cmake --build copy_command/build

    - name: Run tests with CTest
      run: ctest --output-on-failure
      working-directory: copy_command/build
